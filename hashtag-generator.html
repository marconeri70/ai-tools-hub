<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generatore Hashtag Gratis | ToolNova Italia</title>
  <meta name="description" content="Generatore hashtag gratis online per Instagram, TikTok, Facebook e marketing. Inserisci un argomento e ottieni hashtag pronti da copiare." />
  <style>
    :root { --bg:#07111f; --panel:rgba(15,24,41,.82); --line:rgba(255,255,255,.09); --text:#eef4ff; --muted:#9fb0d2; --accent:#4da3ff; --accent2:#7c5cff; }
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--text);background:linear-gradient(180deg,#06101c 0%,#091425 44%,#08111e 100%)}
    a{color:inherit;text-decoration:none}.container{max-width:900px;margin:0 auto;padding:0 20px}.top{padding:24px 0}.back{color:var(--muted);font-weight:700}.card{margin:20px 0;background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:24px;box-shadow:0 22px 50px rgba(0,0,0,.36)}
    h1{margin:0 0 10px;font-size:38px}.desc{margin:0;color:var(--muted);line-height:1.7}label{display:block;margin:18px 0 8px;color:var(--muted);font-size:12px;font-weight:700}input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--text);padding:13px 14px;border-radius:14px;font-size:14px}button{border:0;border-radius:14px;padding:13px 18px;cursor:pointer;font-weight:800;font-size:14px;color:white;background:linear-gradient(135deg,var(--accent),var(--accent2));margin-top:14px} .secondary{background:rgba(255,255,255,.06);border:1px solid var(--line);margin-left:8px}.output{margin-top:14px;min-height:72px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:15px;padding:12px;white-space:pre-wrap;line-height:1.6}.seo{margin-top:18px;color:var(--muted);line-height:1.7}
  </style>
</head>
<body>
  <div class="container">
    <div class="top"><a class="back" href="index.html">← Torna alla home</a></div>
    <div class="card">
      <h1>Generatore Hashtag Gratis</h1>
      <p class="desc">Inserisci un argomento e genera hashtag semplici da usare per social media, marketing e contenuti.</p>
      <label>Argomento</label>
      <input id="topic" type="text" placeholder="es. ristorante, calcio, viaggi" />
      <button onclick="generateHashtags()">Genera hashtag</button>
      <button class="secondary" onclick="copyOutput()">Copia</button>
      <div id="output" class="output"></div>
      <p class="seo">Questo tool è utile per chi crea contenuti su Instagram, TikTok, Facebook e per chi vuole migliorare rapidamente la visibilità dei propri post.</p>
    </div>
  </div>
  <script>
    function generateHashtags() {
      const topic = (document.getElementById('topic').value || 'contenuti').trim().toLowerCase();
      const clean = topic.replace(/\s+/g, '');
      const tags = [`#${clean}`, `#${clean}italia`, `#${clean}lover`, `#${clean}time`, '#viral', '#trending', '#social', '#marketing', '#italia', '#contentcreator'];
      document.getElementById('output').textContent = [...new Set(tags)].join(' ');
    }
    function copyOutput() {
      const text = document.getElementById('output').textContent.trim();
      if (!text) return alert('Niente da copiare.');
      navigator.clipboard.writeText(text).then(()=>alert('Copiato negli appunti.'));
    }
  </script>
</body>
</html>
